taps:
  - afeldman/homebrew-tap
  - Arthur-Ficial/tap

profiles:
  # yp = "Your Personal AI Stack"
  yp:
    description: "Lokaler AI-Stack mit Ollama + PAI + Fabric + Obsidian."
    groups:
      - base
      - ollama
      - fabric
      - pai
      - obsidian
      - vectordb
      - scripts
      - apple-intelligence

  # dp = "Developer Pro"
  dp:
    description: "Vollständiger Dev-Stack mit AI, Docker, Python, Node.js"
    groups:
      - base
      - ollama
      - fabric
      - pai
      - docker
      - vscode
      - python-dev
      - nodejs
      - go-dev
      - rust-dev
      - iac
      - databases
      - vectordb
      - productivity
      - shred
      - gofish
      - my-tools
      - scripts
      - apple-intelligence

  # jp = "Just Prompts / Journaling"
  jp:
    description: "Leichtgewichtiger Stack für Schreiben, Notizen, Prompts."
    groups:
      - base
      - fabric
      - obsidian

  # mp = "Model Playground"
  mp:
    description: "Nur lokale Modelle (Ollama + LM Studio) zum Spielen."
    groups:
      - base
      - ollama
      - lmstudio

  # devops = "DevOps Engineer Stack"
  devops:
    description: "DevOps Engineer Stack: Cloud, K8s, GitOps, lokale Umgebung"
    groups:
      - base
      - iac
      - docker
      - cloudlogin
      - cloud-playground
      - devops-desk
      - fluxcd

  # work = "Arbeits-Setup via Homebrew Cask (kein Source-Build)"
  work:
    description: "Arbeits-Setup: DevOps + eigene Tools via Homebrew (afeldman/homebrew-tap)"
    groups:
      - base
      - iac
      - docker
      - my-tools-brew
      - devops-desk
      - fluxcd

groups:
  base:
    description: "Basis-Tools für lokalen AI-Stack"
    brew:
      - git
      - curl
      - gum
      - jq
      - yq # YAML CLI (wichtig für bootstrap)
      - uv
      - fzf
      - dos2unix
      - block-goose-cli # Rust-basiertes AI CLI Tool
      - shellcheck # Shell-Script Linter
    zb:
      - ripgrep
      - fd
      - bat

  ollama:
    description: "Ollama CLI Runtime für lokale LLMs"
    brew:
      - ollama

  lmstudio:
    host_only: true
    description: "LM Studio GUI (nur macOS)"
    cask:
      - lm-studio

  obsidian:
    host_only: true
    description: "Obsidian Second Brain"
    cask:
      - obsidian

  fabric:
    description: "Fabric-AI CLI und Umgebung"
    brew:
      - fabric-ai

  pai:
    description: "Personal AI Infrastructure (PAI) + Bun"
    brew:
      - bun
    git_repos:
      - repo: "https://github.com/danielmiessler/Personal_AI_Infrastructure.git"
        dest: "$DEV_PATH/Personal_AI_Infrastructure"

  docker:
    description: "Docker Desktop & CLI Tools"
    brew:
      - docker
      - docker-compose
      - lazydocker
    cask:
      - docker-desktop

  vscode:
    host_only: true
    description: "VS Code & Cursor AI Editors"
    cask:
      - visual-studio-code
      - cursor
    brew:
      - code-server # optional: VS Code im Browser

  python-dev:
    description: "Python Development Stack"
    brew:
      - python@3.11
      - python@3.12
      - pipenv
      - poetry
      - pyenv
      - jupyter
      - ipython
      - black
      - ruff
      - mypy

  nodejs:
    description: "Node.js & JavaScript Tools"
    brew:
      - node
      - nvm
      - pnpm
      - yarn

  productivity:
    host_only: true
    description: "Produktivitäts-Tools für macOS"
    cask:
      - raycast
      - rectangle
      - fork
      - iterm2
      - bruno
      - obsidian

  ai-tools:
    description: "Erweiterte AI/ML Tools"
    brew:
      - gh # GitHub CLI
      - postgresql@16
    cask:
      - postman
      - lm-studio

  databases:
    description: "Datenbanken & Vector Stores"
    brew:
      - postgresql@16
      - redis
      - sqlite

  vectordb:
    description: "Vector-Datenbanken für AI/ML"
    brew:
      - qdrant
    cask:
      - qdrant

  go-dev:
    description: "Go Development Stack"
    brew:
      - go
      - go-task
      - goreleaser
      - golangci-lint
      - graphviz

  rust-dev:
    description: "Rust Development Stack"
    brew:
      - rust
      - rust-analyzer
      - cargo-watch
      - cargo-edit

  iac:
    description: "Infrastructure as Code Tools"
    brew:
      - terraform
      - kubernetes-cli
      - awscli
      - tflint
      - checkov
      - tfcli
      - k9s
    cask:
      - openlens


  harbor:
    description: "Harbor Container Registry CLI/Tools"
    brew:
      - docker-compose # Harbor läuft meist als Compose/Helm

  fluxcd:
    description: "FluxCD GitOps CLI"
    brew:
      - flux

  cloudlogin:
    description: "AWS + Kubernetes SSO & Connection Manager (GUI + TUI)"
    brew:
      - awscli
      - kubernetes-cli
    git_repos:
      - repo: "https://github.com/afeldman/cloudlogin.git"
        dest: "$DEV_PATH/cloudlogin"
        post_install: "cd $DEV_PATH/cloudlogin && go install ./..."

  cloud-playground:
    description: "Lokale K8s/AWS Emulation mit Kind + LocalStack + Terraform"
    brew:
      - kind
      - localstack
      - terraform
      - go-task
    git_repos:
      - repo: "https://github.com/afeldman/cloud-playground.git"
        dest: "$DEV_PATH/cloud-playground"
        post_install: "cd $DEV_PATH/cloud-playground && go install ./cmd/cpctl/..."

  devops-desk:
    description: "Bash-basiertes DevOps Terminal Control Center (fzf-driven)"
    brew:
      - fzf
      - kubernetes-cli
      - awscli
      - helm
      - flux
    git_repos:
      - repo: "https://github.com/afeldman/devops-desk.git"
        dest: "$DEV_PATH/devops-desk"
        post_install: "cd $DEV_PATH/devops-desk && make install"

  shred:
    description: "Sicheres Löschen von Dateien (fast/gutmann/usdod/vsitr)"
    git_repos:
      - repo: "https://github.com/afeldman/shred.git"
        dest: "$DEV_PATH/shred"
        post_install: "cd $DEV_PATH/shred && go install ./..."

  gofish:
    description: "GoFish Package Manager + fish-food + gotofish (setzt Go voraus)"
    git_repos:
      - repo: "https://github.com/afeldman/gofish.git"
        dest: "$DEV_PATH/gofish"
        post_install: "cd $DEV_PATH/gofish && GOBIN=$HOME/.local/bin go install ./..."
      - repo: "https://github.com/afeldman/fish-food.git"
        dest: "$DEV_PATH/fish-food"
        post_install: "gotofish setup"

  my-tools:
    description: "Eigene Go-Tools via gofish (setzt gofish-Gruppe voraus)"
    post_install: "gotofish sync"

  scripts:
    description: "Persönliche Utility-Scripts (Encryption, Git-Helpers, Toolchain-Installer)"
    git_repos:
      - repo: "https://github.com/afeldman/scripts.git"
        dest: "$DEV_PATH/scripts"
        post_install: "cd $DEV_PATH/scripts && sh install.sh"

  my-tools-brew:
    description: "Eigene Go-Tools via Homebrew Cask (afeldman/homebrew-tap)"
    cask:
      - batch-cost
      - cloudlogin
      - cpctl
      - project-check
      - shred

  shellcheck-dev:
    description: "ShellCheck Quellcode (für Entwicklung/Beiträge)"
    git_repos:
      - repo: "https://github.com/afeldman/shellcheck.git"
        dest: "$DEV_PATH/shellcheck"

  apple-intelligence:
    apple_only: true
    description: "Apple Intelligence CLI (apfel) — erfordert macOS 26+, Apple Silicon M1+, Apple Intelligence aktiviert"
    brew:
      - apfel
